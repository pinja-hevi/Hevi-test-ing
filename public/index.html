<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m13-9l2 9m-9-4h4"/>
        </svg>
        <span>Inventory Manager</span>
      </div>
      <button class="btn btn-primary" id="openAddModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Total Products</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statCategories">—</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statUnits">—</div>
        <div class="stat-label">Units in Stock</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLow">—</div>
        <div class="stat-label">Low Stock (&lt;10)</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search products, SKU…" />
        <button class="search-clear hidden" id="clearSearch" aria-label="Clear search">✕</button>
      </div>

      <div class="filter-wrap">
        <label for="categoryFilter" class="sr-only">Category</label>
        <select id="categoryFilter" class="select-input">
          <option value="All">All Categories</option>
        </select>
      </div>

      <div class="view-toggle">
        <button class="view-btn active" id="btnGrid" aria-label="Grid view" title="Grid view">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="view-btn" id="btnList" aria-label="List view" title="List view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" id="productGrid"></div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path d="M16 3H8l-2 4h12l-2-4z"/>
      </svg>
      <p>No products found</p>
      <small>Try adjusting your search or filter</small>
    </div>
  </main>

  <!-- Add / Edit Product Modal -->
  <div class="modal-overlay hidden" id="productModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <button class="modal-close" id="closeModal" aria-label="Close">✕</button>
      </div>
      <form id="productForm" class="modal-form" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-grid">
          <div class="form-group form-group--full">
            <label for="fName">Product Name <span class="required">*</span></label>
            <input type="text" id="fName" placeholder="e.g. Wireless Headphones" required />
            <span class="field-error" id="errName"></span>
          </div>
          <div class="form-group">
            <label for="fCategory">Category <span class="required">*</span></label>
            <input type="text" id="fCategory" placeholder="e.g. Electronics" list="categoryList" required />
            <datalist id="categoryList"></datalist>
            <span class="field-error" id="errCategory"></span>
          </div>
          <div class="form-group">
            <label for="fSku">SKU <span class="required">*</span></label>
            <input type="text" id="fSku" placeholder="e.g. ELEC-005" required />
            <span class="field-error" id="errSku"></span>
          </div>
          <div class="form-group">
            <label for="fPrice">Price (€) <span class="required">*</span></label>
            <input type="number" id="fPrice" min="0" step="0.01" placeholder="0.00" required />
            <span class="field-error" id="errPrice"></span>
          </div>
          <div class="form-group">
            <label for="fQuantity">Quantity <span class="required">*</span></label>
            <input type="number" id="fQuantity" min="0" step="1" placeholder="0" required />
            <span class="field-error" id="errQuantity"></span>
          </div>
          <div class="form-group form-group--full">
            <label for="fDescription">Description</label>
            <textarea id="fDescription" rows="2" placeholder="Optional product description"></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay hidden" id="deleteModal">
    <div class="modal modal--sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>Delete Product</h2>
        <button class="modal-close" id="closeDeleteModal" aria-label="Close">✕</button>
      </div>
      <p class="delete-msg">Are you sure you want to delete <strong id="deleteProductName"></strong>? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
        <button class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
